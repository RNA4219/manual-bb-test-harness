<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Regression Impact Graph</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    body { margin: 0; font-family: sans-serif; }
    .node { cursor: pointer; }
    .node rect { fill: lightblue; stroke: steelblue; stroke-width: 1px; }
    .node text { font-size: 12px; }
    .link { stroke: #999; stroke-opacity: 0.6; }
    .link.direct { stroke: red; stroke-width: 2px; }
    .link.external { stroke: orange; stroke-dasharray: 5,5; }
    .link.shared_area { stroke: #666; }
  </style>
</head>
<body>
  <svg id="graph" width="800" height="600"></svg>
  <script>
    const data = {
  "nodes": [
    {
      "id": "RBAC-01",
      "label": "\u7ba1\u7406\u8005\u6a29\u9650\u5909\u66f4\u6a5f\u80fd",
      "areas": [
        "user_management",
        "auth_service",
        "audit_log"
      ]
    },
    {
      "id": "ORD-CANCEL-02",
      "label": "Order Cancellation with Partial Refund",
      "areas": [
        "order_service",
        "payment_service",
        "notification_service",
        "refund_calculator"
      ]
    },
    {
      "id": "ORD-CANCEL-01",
      "label": "\u6ce8\u6587\u30ad\u30e3\u30f3\u30bb\u30eb\u6a5f\u80fd",
      "areas": [
        "order_detail",
        "inventory_service",
        "coupon_service"
      ]
    }
  ],
  "links": []
};

    const svg = d3.select("#graph");
    const width = 800;
    const height = 600;

    const simulation = d3.forceSimulation(data.nodes)
      .force("link", d3.forceLink(data.links).id(d => d.id).distance(150))
      .force("charge", d3.forceManyBody().strength(-300))
      .force("center", d3.forceCenter(width / 2, height / 2));

    const link = svg.selectAll(".link")
      .data(data.links)
      .enter().append("line")
      .attr("class", d => "link " + d.type)
      .attr("stroke-width", d => d.type === "direct" ? 2 : 1);

    const node = svg.selectAll(".node")
      .data(data.nodes)
      .enter().append("g")
      .attr("class", "node")
      .call(d3.drag()
        .on("start", dragstarted)
        .on("drag", dragged)
        .on("end", dragended));

    node.append("rect")
      .attr("width", 100)
      .attr("height", 40)
      .attr("x", -50)
      .attr("y", -20);

    node.append("text")
      .attr("dy", -5)
      .attr("text-anchor", "middle")
      .text(d => d.id);

    node.append("text")
      .attr("dy", 10)
      .attr("text-anchor", "middle")
      .attr("font-size", "10px")
      .text(d => d.label.substring(0, 15) + (d.label.length > 15 ? "..." : ""));

    simulation.on("tick", () => {
      link
        .attr("x1", d => d.source.x)
        .attr("y1", d => d.source.y)
        .attr("x2", d => d.target.x)
        .attr("y2", d => d.target.y);
      node.attr("transform", d => "translate(" + d.x + "," + d.y + ")");
    });

    function dragstarted(event, d) {
      if (!event.active) simulation.alphaTarget(0.3).restart();
      d.fx = d.x;
      d.fy = d.y;
    }

    function dragged(event, d) {
      d.fx = event.x;
      d.fy = event.y;
    }

    function dragended(event, d) {
      if (!event.active) simulation.alphaTarget(0);
      d.fx = null;
      d.fy = null;
    }
  </script>
</body>
</html>
