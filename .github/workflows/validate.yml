name: validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  skill:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov ruff

      - name: Lint Python scripts
        run: ruff check scripts/ tests/ --fix
        continue-on-error: true

      - name: Validate repository-local skill structure (Python)
        run: python scripts/quick-validate-skill.py skills/manual-bb-test-harness

      - name: Validate PowerShell checks
        shell: pwsh
        run: ./scripts/validate-skill.ps1

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

      - name: Run tests with coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: pytest tests/ -v --cov=scripts --cov-report=xml

      - name: Test script help commands
        run: |
          for script in scripts/*.py; do
            python "$script" --help > /dev/null || exit 1
          done
        shell: bash

      - name: Test evaluate-gate.py
        run: |
          python scripts/evaluate-gate.py \
            --evidence examples/artifacts/execution_evidence \
            --risk examples/artifacts/order-cancel.risk_register.json \
            --cases examples/artifacts/order-cancel.manual_case_set.json \
            --output /tmp/gate_test.json \
            --profile standard
        shell: bash

      - name: Test risk-heatmap.py
        run: |
          python scripts/risk-heatmap.py \
            --input examples/artifacts/order-cancel.risk_register.json \
            --output /tmp/heatmap_test.html
        shell: bash

      - name: Test state-diagram.py
        run: |
          python scripts/state-diagram.py \
            --input examples/artifacts/order-cancel.test_model.json \
            --output /tmp/states_test.mmd
        shell: bash

      - name: Validate JSON schemas
        run: |
          for f in schemas/*.json examples/artifacts/*.json; do
            python -m json.tool "$f" > /dev/null || exit 1
          done
        shell: bash

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false