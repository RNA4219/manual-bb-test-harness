repos:
  - repo: local
    hooks:
      - id: validate-skill
        name: Validate Skill Structure
        entry: python scripts/quick-validate-skill.py skills/manual-bb-test-harness
        language: system
        pass_filenames: false
        stages: [commit]

      - id: validate-json-syntax
        name: Validate JSON Syntax
        entry: python -c "import sys,json; json.load(open(sys.argv[1]))"
        language: system
        files: \.json$
        stages: [commit]

      - id: validate-specs
        name: Validate Specification Documents
        entry: python scripts/validate-spec.py --all
        language: system
        pass_filenames: false
        stages: [commit]

      - id: check-utf8
        name: Check UTF-8 Encoding
        entry: python scripts/check-utf8.py
        language: system
        files: \.(md|py|yaml|json)$
        stages: [commit]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=500']